<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>//Chakange//</title>
</head>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.wrapper{
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.box{
    width: 400px;
    height: 500px;
    background-color: black;
    border-radius: 5%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    overflow-y: hidden;
}
.box_top{
    width: 380px;
    height: 50px;
    background-color: aqua;
    display: flex;
    justify-content: end;
    align-items: center;
}
.box_bottom{
    width: 400px;
    height: 400px;
    background-color: yellow;
    display: grid;
    grid-template-columns: auto auto auto;
    padding: 30px;
}


</style>
<body>
    <div class="wrapper">
        <div class="box">
            <div class="box_top">
                <h1 id="result">0</h1>
            </div>
            <div class="box_bottom">
                <button id="plus"><h2>+</h2></button>
                <button id="minus"><h2>-</h2></button>
                <button id="ko'p"><h2>*</h2></button>
                <button id="kam" ><h2>/</h2></button>
                <button id="foiz"><h2>%</h2></button>
                <button id="del"><h2>✖</h2></button>
                <button id="one"><h2>1</h2></button>
                <button id="two"><h2>2</h2></button>
                <button id="three"><h2>3</h2></button>
                <button id="four"><h2>4</h2></button>
                <button id="five"><h2>5</h2></button>
                <button id="six"><h2>6</h2></button>
                <button id="seven"><h2>7</h2></button>
                <button id="eight"><h2>8</h2></button>
                <button id="nine"><h2>9</h2></button>
                <button id="zero"><h2>0</h2></button> 
            </div>
        </div>



    </div>






    <script>

    </script>
</body>
</html>
